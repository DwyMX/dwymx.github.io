window.addEventListener('keyup',e=>{K[e.code]=false;});
const kd=c=>!!K[c];
function kjust(c){if(KJ[c]){KJ[c]=false;return true;}return false;}

// ── SPRITE IMAGE LOADING ──────────────────────────────────────
const IMG={};
let imgsLoaded=0,imgTotal=0;
function loadImg(key){
  imgTotal++;
  const im=new Image();
  im.onload=()=>{IMG[key]=im;imgsLoaded++;};
  im.src=SPRITES_B64[key]||'';
}
// Load all sprites
Object.keys(SPRITES_B64).forEach(k=>loadImg(k));

function getImg(key){return IMG[key]||null;}

// ── DRAW SPRITE HELPER ────────────────────────────
function drawSprite(key, x, y, w, h, flipX=false){
  const im=getImg(key);
  if(!im)return;
  cx.save();
  if(flipX){
    cx.translate(Math.floor(x)+w, 0);
    cx.scale(-1,1);
    cx.drawImage(im, 0, Math.floor(y), w, h);
  } else {
    cx.drawImage(im, Math.floor(x), Math.floor(y), w, h);
  }
  cx.restore();
}

const CHAR_W=64, CHAR_H=96;

// Character drawing: Sara uses right-side sprites flipped for left direction
function getSaraKey(dir, frame){
  const walking = frame > 0;
  // For left direction, use right sprites (will be flipped in drawChar)
  const lookupDir = (dir==='left') ? 'right' : (dir||'down');
  if(!walking) return `sara_${lookupDir}_idle`;
  const walkIdx = ((frame-1)%4)+1;
  const key = `sara_${lookupDir}_walk${walkIdx}`;
  return IMG[key] ? key : `sara_${lookupDir}_idle`;
}

function getEmmanKey(dir, frame){
  const walking = frame > 0;
  const idleKey = `emman_idle${(Math.floor(Date.now()/600)%4)+1}`;
  if(dir==='up') return walking ? 'emman_up_walk1' : 'emman_up_idle';
  if(dir==='down'){
    if(!walking) return 'emman_down_idle';
    const wkeys=['emman_down_idle','emman_down_walk1','emman_down_walk2','emman_down_walk3'];
    return wkeys[frame % wkeys.length];
  }
  if(dir==='right') return walking ? `emman_right_walk${((frame-1)%4)+1}` : idleKey;
  // For emman left: also use right sprites flipped
  if(dir==='left') return walking ? `emman_right_walk${((frame-1)%4)+1}` : idleKey;
  return 'emman_down_idle';
}

function drawChar(who, x, y, dir, frame){
  const flipX = (dir==='left');  // mirror right sprites for left direction
  const key = who==='sara' ? getSaraKey(dir,frame) : getEmmanKey(dir,frame);
  drawSprite(key, x, y, CHAR_W, CHAR_H, flipX);
}

// ── TILE DRAWING ──────────────────────────────────────────────
function drawTile(id, px, py, tx, ty){
  switch(id){
    case 0: // Building wall
      cx.fillStyle='#4A342B'; cx.fillRect(px,py,TS,TS);
      cx.fillStyle='#3A2820'; cx.fillRect(px+2,py+2,TS-4,TS-4);
      cx.fillStyle='#5C453C'; cx.fillRect(px+2,py+2,TS-4,4);
      break;
    case 1: // Cobblestone path
      const base=(tx+ty)%2===0?'#A89888':'#9E8E7E';
      cx.fillStyle=base; cx.fillRect(px,py,TS,TS);
      cx.strokeStyle='rgba(0,0,0,0.15)'; cx.lineWidth=1;
      cx.beginPath(); cx.arc(px+8,py+8,6,0,Math.PI*2); cx.stroke();
      cx.beginPath(); cx.arc(px+24,py+24,6,0,Math.PI*2); cx.stroke();
      break;
    case 2: // Grass
      cx.fillStyle=(tx+ty)%3===0?'#5F9B43':'#558B3A'; cx.fillRect(px,py,TS,TS);
      if((tx*5+ty*3)%7===0){cx.fillStyle='rgba(0,0,0,0.08)';cx.fillRect(px+4,py+6,3,10);}
      if((tx*3+ty*7)%9===0){cx.fillStyle='rgba(0,0,0,0.08)';cx.fillRect(px+18,py+16,3,8);}
      break;
    case 3: // Tree (drawn via sprite in decorations)
      cx.fillStyle='#558B3A'; cx.fillRect(px,py,TS,TS);
      break;
    case 4: // Flower
      cx.fillStyle='#5F9B43'; cx.fillRect(px,py,TS,TS);
      const t4=Date.now()/800;
      cx.fillStyle='#FFB3C6'; cx.beginPath(); cx.arc(px+16,py+16,5,0,Math.PI*2); cx.fill();
      cx.fillStyle='#FFD700'; cx.beginPath(); cx.arc(px+16,py+16,2,0,Math.PI*2); cx.fill();
      break;
    case 6: // Wood interior floor
      cx.fillStyle=(tx+ty)%2===0?'#7D5230':'#6B4424'; cx.fillRect(px,py,TS,TS);
      cx.strokeStyle='rgba(0,0,0,0.2)'; cx.lineWidth=1;
      cx.strokeRect(px,py,TS,TS);
      break;
    case 7: // Stone plaza / fountain area
      cx.fillStyle='#C8BDB0'; cx.fillRect(px,py,TS,TS);
      cx.strokeStyle='rgba(0,0,0,0.1)'; cx.lineWidth=1; cx.strokeRect(px,py,TS,TS);
      break;
    case 8: // Interior wall
      cx.fillStyle='#E8D8C8'; cx.fillRect(px,py,TS,TS);
      cx.fillStyle='#D4C0AC'; cx.fillRect(px,py,TS,4);
      break;
  }
}

function fillRect(g,x,y,w,h,ch){for(let cy=y;cy<y+h;cy++)for(let cx2=x;cx2<x+w;cx2++){if(cy>=0&&cy<g.length&&cx2>=0&&cx2<g[0].length)g[cy][cx2]=ch;}}
function fillRow(g,x,y,len,ch){fillRect(g,x,y,len,1,ch);}
function fillCol(g,x,y,len,ch){fillRect(g,x,y,1,len,ch);}

// ── CAMERA ───────────────────────────────────────────────────
function getCamera(){
  const map=MAP_DATA[gs.map];
  const mw=map.grid[0].length*TS,mh=map.grid.length*TS;
  let camX=gs.player.x+CHAR_W/2-GW/2;
  let camY=gs.player.y+CHAR_H/2-GH/2;
  if(mw<GW){camX=-(GW-mw)/2;}else{camX=Math.max(0,Math.min(camX,mw-GW));}
  if(mh<GH){camY=-(GH-mh)/2;}else{camY=Math.max(0,Math.min(camY,mh-GH));}
  return{x:camX,y:camY};
}

// ── DIALOGUE SYSTEM ──────────────────────────────────────────
const SPEED=30;
function startDlg(lines,arg1=null,arg2=null,role='npc'){
  gs.dlgLines=lines;gs.dlgIdx=0;gs.dlgActive=true;
  gs.dlgTyped='';gs.dlgTypeT=0;
  if(typeof arg1==='function'){gs.dlgCallback=arg1;gs.dlgChar=(typeof arg2==='string')?arg2:'';}
  else if(typeof arg1==='string'){gs.dlgChar=arg1;gs.dlgCallback=(typeof arg2==='function')?arg2:null;}
  else{gs.dlgChar='';gs.dlgCallback=null;}
  gs.dlgCharRole=role;
}
function updateDlg(dt){
  if(!gs.dlgActive)return;
  const cur=gs.dlgLines[gs.dlgIdx]||'';
  if(gs.dlgTyped.length<cur.length){gs.dlgTypeT+=dt;gs.dlgTyped=cur.slice(0,Math.min(Math.floor(gs.dlgTypeT*SPEED),cur.length));}
  if(isAct()){
    if(gs.dlgTyped.length<cur.length){gs.dlgTyped=cur;return;}
    sfx('dlg');gs.dlgIdx++;
    if(gs.dlgIdx>=gs.dlgLines.length){gs.dlgActive=false;if(gs.dlgCallback)gs.dlgCallback();}
    else{gs.dlgTyped='';gs.dlgTypeT=0;}
  }
}

// Auto-detect speaker from line prefix
function getSpeakerFromLine(line){
  if(line.startsWith('Sara:'))return{name:'Sara',role:'sara'};
  if(line.startsWith('Emmanuel:'))return{name:'Emmanuel',role:'emman'};
  return{name:gs.dlgChar||'',role:gs.dlgCharRole||'npc'};
}

function renderDlg(){
  if(!gs.dlgActive)return;
  const line=gs.dlgLines[gs.dlgIdx]||'';
  const{name,role}=getSpeakerFromLine(line||gs.dlgTyped);

  // Box
  cx.fillStyle='rgba(8,6,18,0.97)';
  roundRect(cx,20,GH-145,GW-40,125,12);cx.fill();

  // Pink border for Sara, Blue for Emmanuel, Neutral otherwise
  let borderColor='#FF8FAB';
  if(role==='emman') borderColor='#4DB8FF';
  else if(role==='npc'&&gs.dlgChar==='Emmanuel') borderColor='#4DB8FF';
  cx.strokeStyle=borderColor;cx.lineWidth=2;
  roundRect(cx,20,GH-145,GW-40,125,12);cx.stroke();

  // Speaker tag
  if(name){
    const tagColor=role==='sara'?'#FF8FAB':(role==='emman'?'#4DB8FF':'#FF8FAB');
    cx.fillStyle=tagColor;
    roundRect(cx,30,GH-160,Math.max(name.length*9+20,80),20,5);cx.fill();
    cx.fillStyle='#08060E';cx.font='bold 11px monospace';cx.textAlign='left';
    cx.fillText(name,40,GH-147);
  }

  // Text (strip speaker prefix for display)
  let displayText=gs.dlgTyped;
  if(displayText.startsWith('Sara: '))displayText=displayText.slice(6);
  else if(displayText.startsWith('Emmanuel: '))displayText=displayText.slice(10);

  cx.fillStyle='#F0EEF0';cx.font='13px monospace';cx.textAlign='left';
  wrapText(cx,displayText,36,GH-118,GW-84,22);

  const cur=gs.dlgLines[gs.dlgIdx]||'';
  if(gs.dlgTyped.length>=cur.length&&Math.floor(Date.now()/400)%2===0){
    cx.fillStyle=borderColor;cx.fillText('▼',GW-55,GH-28);
  }
  cx.fillStyle='#666';cx.font='10px monospace';cx.textAlign='right';
  cx.fillText(`${gs.dlgIdx+1}/${gs.dlgLines.length}`,GW-30,GH-28);
}

function wrapText(c,text,x,y,maxW,lineH){
  const words=text.split(' ');let line='';
  words.forEach((w,i)=>{
    const test=line+w+' ';
    if(c.measureText(test).width>maxW&&i>0){c.fillText(line.trim(),x,y);line=w+' ';y+=lineH;}
    else line=test;
  });
  if(line)c.fillText(line.trim(),x,y);
}
function roundRect(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);
  c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();
}

// ── MOVEMENT & COLLISION ─────────────────────────────────────
function updatePlayer(dt){
  if(gs.dlgActive||gs.fadeState!=='none')return;
  const p=gs.player;
  const map=MAP_DATA[gs.map];
  const spd=110;
  let dx=0,dy=0;
  if(movL()){dx=-1;p.dir='left';}else if(movR()){dx=1;p.dir='right';}
  else if(movU()){dy=-1;p.dir='up';}else if(movD_k()){dy=1;p.dir='down';}
  p.moving=(dx!==0||dy!==0);
  if(p.moving){
    p.frameT+=dt;
    if(p.frameT>0.14){p.frame=p.frame%4+1;p.frameT=0;}
    const nx=p.x+dx*spd*dt,ny=p.y+dy*spd*dt;
    const hw=8,hh=4;
    if(canMove(nx,p.y,hw,hh,map.grid))p.x=nx;
    if(canMove(p.x,ny,hw,hh,map.grid))p.y=ny;
  } else{p.frame=0;p.frameT=0;}
}
function canMove(x,y,hw,hh,grid){
  const tw=grid[0].length,th=grid.length;
  const fx=Math.floor((x+CHAR_W/2-hw)/TS),fy=Math.floor((y+CHAR_H-hh)/TS);
  const tx=Math.floor((x+CHAR_W/2+hw)/TS),ty=Math.floor((y+CHAR_H+hh)/TS);
  if(fx<0||tx>=tw||fy<0||ty>=th)return false;
  const b=['0','3','8'];
  return!b.includes(grid[fy][fx])&&!b.includes(grid[fy][tx])&&!b.includes(grid[ty][fx])&&!b.includes(grid[ty][tx]);
}
function playerTX(){return Math.floor((gs.player.x+CHAR_W/2)/TS);}
function playerTY(){return Math.floor((gs.player.y+CHAR_H*0.85)/TS);}

// ── PORTALS ──────────────────────────────────────────────────
function checkPortals(){
  if(gs.fadeState!=='none'||gs.dlgActive)return;
  const map=MAP_DATA[gs.map];
  const ptx=playerTX(),pty=playerTY();
  const maxX=map.grid[0].length-1,maxY=map.grid.length-1;
  if(gs.map==='town'){
    if(pty<=0){doTransition('uni',14*TS,18*TS,'up');return;}
    if(pty>=maxY){doTransition('deportiva',25*TS,3*TS,'down');return;}
    if(ptx<=0){doTransition('callejon',27*TS,5*TS,'left');return;}
    if(ptx>=maxX){doTransition('paraiso',2*TS,20*TS,'right');return;}
  }
  for(const p of (map.portals||[])){
    if(ptx>=p.x&&ptx<p.x+p.w&&pty>=p.y&&pty<p.y+p.h){doTransition(p.target,p.tx,p.ty,p.dir);break;}
  }
}
function doTransition(target,tx,ty,dir){
  gs.fadeState='out';gs.fadeTarget={target,tx,ty,dir};
}
function updateFade(dt){
  if(gs.fadeState==='none')return;
  if(gs.fadeState==='out'){
    gs.fade+=dt*2.5;
    if(gs.fade>=1){gs.fade=1;gs.map=gs.fadeTarget.target;gs.player.x=gs.fadeTarget.tx;gs.player.y=gs.fadeTarget.ty;gs.player.dir=gs.fadeTarget.dir;gs.fadeState='in';}
  } else{
    gs.fade-=dt*2.5;
    if(gs.fade<=0){gs.fade=0;gs.fadeState='none';gs.fadeTarget=null;}
  }
}

// ── EVENTS ───────────────────────────────────────────────────
function checkEvents(){
  if(gs.dlgActive||gs.fadeState!=='none')return;
  const evs=MAP_EVENTS[gs.map]||[];
  const ptx=playerTX(),pty=playerTY();
  gs.interactPrompt=false;gs.interactTarget=null;
  for(const ev of evs){
    if(ev.ch&&ev.ch!==gs.chapter)continue;
    if(ev.type==='memory'&&gs.memories.has(ev.id))continue;
    const d=Math.sqrt((ptx-ev.tx)**2+(pty-ev.ty)**2);
    if(d<=ev.range){gs.interactPrompt=true;gs.interactTarget=ev;break;}
  }
}
function triggerEvent(ev){
  if(!ev)return;
  switch(ev.type){
    case 'npc':
      startDlg(DLGS.em_npc,'Emmanuel',()=>{
        startDlg(DLGS.em_yes,'Sara',()=>{sfx('collect');gs.chapter=2;});
      },'emman');break;
    case 'memory':
      startDlg(DLGS[ev.id]||['...'],()=>{
        gs.memories.add(ev.id);sfx('collect');
        if(gs.memories.size>=MEMORIES_NEEDED){
          setTimeout(()=>startDlg(DLGS.memories_full,()=>startDlg(DLGS.boss_intro,()=>startBoss())),200);
        }
      },'Recuerdo ❤️');break;
    case 'hint':
      startDlg(['Sara: "Qué bello día en el campus de la UTNG."','Sara: "Debo salir al Centro de Dolores a buscar a Emmanuel."','(Camina al sur para salir al pueblo)'],'Sara');break;
  }
}

function startBoss(){gs.scene='battle';gs.bossIdx=0;initBoss(0);}
function initBoss(idx){const b=BOSSES[idx];gs.bossHp=b.hp;gs.bossMaxHp=b.maxHp;gs.saraHp=gs.saraMaxHp;gs.battlePhase='intro';gs.battleMsg='';gs.saraShake=0;gs.bossShake=0;startDlg(b.introLines,()=>{gs.battlePhase='select';});}
function updateBattle(dt){
  if(gs.dlgActive){updateDlg(dt);return;}
  if(gs.battlePhase==='anim'){gs.battleAnim-=dt;if(gs.battleAnim<=0)gs.battlePhase='enemy';}
  if(gs.battlePhase==='enemy')doEnemyTurn();
  if(gs.battlePhase==='result'){gs.battleMsgTimer-=dt;if(gs.battleMsgTimer<=0){gs.battlePhase='select';gs.battleMsg='';}}
  gs.saraShake=Math.max(0,gs.saraShake-dt*8);gs.bossShake=Math.max(0,gs.bossShake-dt*8);
}
function doPlayerAtk(type){
  const b=BOSSES[gs.bossIdx];let dmg=0;
  if(type==='attack'){dmg=Math.max(1,Math.floor(12+Math.random()*8)-b.def);}
  else if(type==='defend'){gs.saraHp=Math.min(gs.saraMaxHp,gs.saraHp+15);gs.battleMsg='¡Sara se cura 15 HP!';gs.battlePhase='result';gs.battleMsgTimer=1.5;sfx('collect');return;}
  else if(type==='special'){dmg=Math.floor(20+Math.random()*15);gs.battleMsg='¡Recuerdo especial! ¡Daño masivo!';}
  gs.bossHp=Math.max(0,gs.bossHp-dmg);gs.bossShake=0.4;sfx('hit');
  if(gs.bossHp<=0){gs.battleMsg=`¡${b.name} fue derrotado!`;gs.battlePhase='result';gs.battleMsgTimer=2;setTimeout(()=>bossWin(),2000);return;}
  gs.battleMsg=`¡${type==='special'?'Fuerza Interior':'Ataque'}! ${dmg} de daño!`;gs.battlePhase='anim';gs.battleAnim=0.5;
}
function doEnemyTurn(){
  const b=BOSSES[gs.bossIdx];const dmg=Math.max(1,b.atk-Math.floor(Math.random()*4));
  gs.saraHp=Math.max(0,gs.saraHp-dmg);gs.saraShake=0.4;sfx('hit');
  gs.battleMsg=`${b.atkMsgs[Math.floor(Math.random()*b.atkMsgs.length)]} (${dmg} daño)`;
  gs.battlePhase='result';gs.battleMsgTimer=1.8;
}
function bossWin(){
  startDlg(BOSSES[gs.bossIdx].winLines,()=>{gs.bossIdx++;if(gs.bossIdx>=BOSSES.length){gs.scene='ending';gs.endFrame=0;gs.endTimer=0;}else initBoss(gs.bossIdx);},'✨');
}

// ── MINIMAP ──────────────────────────────────────────────────
function drawMinimap(){
  const map=MAP_DATA[gs.map];const grid=map.grid;
  const mx=GW-130,my=15,mw=115,mh=90;
  cx.fillStyle='rgba(8,6,18,0.92)';roundRect(cx,mx,my,mw,mh,8);cx.fill();
  cx.strokeStyle='#FF8FAB';cx.lineWidth=2;roundRect(cx,mx,my,mw,mh,8);cx.stroke();
  const gw=grid[0].length,gh=grid.length;
  const cw=mw/gw,ch=mh/gh;
  for(let y=0;y<gh;y++)for(let x=0;x<gw;x++){
    const t2=grid[y][x];
    if(t2==='0'||t2==='8')cx.fillStyle='#3A271D';
    else if(t2==='1'||t2==='7')cx.fillStyle='#6D5C50';
    else if(t2==='6')cx.fillStyle='#8B5A2B';
    else if(t2==='3')cx.fillStyle='#2D5F32';
    else cx.fillStyle='#274E13';
    cx.fillRect(mx+x*cw,my+y*ch,Math.max(1,cw),Math.max(1,ch));
  }
  const ppx=(gs.player.x/(gw*TS))*mw,ppy=(gs.player.y/(gh*TS))*mh;
  cx.fillStyle='#FFFFFF';cx.beginPath();cx.arc(mx+ppx,my+ppy,4,0,Math.PI*2);cx.fill();
  if(Math.floor(Date.now()/250)%2===0){
    cx.strokeStyle='#FF8FAB';cx.lineWidth=1.5;cx.beginPath();cx.arc(mx+ppx,my+ppy,7,0,Math.PI*2);cx.stroke();
  }
  if(gs.map==='uni'){
    if(Math.floor(Date.now()/300)%2===0){
      cx.fillStyle='#00E676';cx.font='bold 11px sans-serif';cx.textAlign='center';
      cx.fillText('▼ SALIDA', mx + mw/2, my + mh - 4);
    }
  }

  // Draw uncollected memories on the minimap
  if(gs.chapter===2){
    const evs=MAP_EVENTS[gs.map]||[];
    for(const ev of evs){
      if(ev.type==='memory'&&!gs.memories.has(ev.id)){
        const epx=(ev.tx/gw)*mw,epy=(ev.ty/gh)*mh;
        cx.fillStyle='#FFD700';cx.beginPath();cx.arc(mx+epx,my+epy,3.5,0,Math.PI*2);cx.fill();
        if(Math.floor(Date.now()/300)%2===0){
          cx.strokeStyle='#FFD700';cx.lineWidth=1;cx.beginPath();cx.arc(mx+epx,my+epy,6,0,Math.PI*2);cx.stroke();
        }
      }
    }
    // If on town map, also draw yellow dots at shop doors and border portals with uncollected memories
    if(gs.map==='town'){
      const portalMems = [
        {px:10.5, py:10, id:'mem_tiendita'},
        {px:10.5, py:20, id:'mem_puerta'},
        {px:31, py:20, id:'mem_taberna'},
        {px:0.5, py:15, id:'mem_callejon'},
        {px:39, py:15, id:'mem_paraiso'},
        {px:20, py:29, id:'mem_deportiva'}
      ];
      for(const pm of portalMems){
        if(!gs.memories.has(pm.id)){
          const epx=(pm.px/gw)*mw,epy=(pm.py/gh)*mh;
          cx.fillStyle='#FFD700';cx.beginPath();cx.arc(mx+epx,my+epy,3.5,0,Math.PI*2);cx.fill();
          if(Math.floor(Date.now()/300)%2===0){
            cx.strokeStyle='#FFD700';cx.lineWidth=1;cx.beginPath();cx.arc(mx+epx,my+epy,6,0,Math.PI*2);cx.stroke();
          }
        }
      }
    }
    // If in paraiso, show yellow dot at house entrance leading to uncollected mem_paraiso inside casa_sara
    if(gs.map==='paraiso' && !gs.memories.has('mem_paraiso')){
      const epx=(31/gw)*mw,epy=(24/gh)*mh;
      cx.fillStyle='#FFD700';cx.beginPath();cx.arc(mx+epx,my+epy,3.5,0,Math.PI*2);cx.fill();
      if(Math.floor(Date.now()/300)%2===0){
        cx.strokeStyle='#FFD700';cx.lineWidth=1;cx.beginPath();cx.arc(mx+epx,my+epy,6,0,Math.PI*2);cx.stroke();
      }
    }
  }
}

bgmDua.volume = 0.35;

const bgmOnePiece = new Audio("One Piece OST Overtaken.mp3");
bgmOnePiece.loop = true;
bgmOnePiece.volume = 0.4;

const bgmMice = new Audio("Mice on Venus.mp3");
bgmMice.loop = true;
bgmMice.volume = 0.45;

let audioCtx=null;
function initAudio(){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){audioCtx=null;}}
function note(freq,start,dur,vol=0.07,type='triangle'){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g2=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g2.gain.setValueAtTime(0,start);g2.gain.linearRampToValueAtTime(vol,start+0.02);g2.gain.exponentialRampToValueAtTime(0.0001,start+dur-0.02);
  o.connect(g2);g2.connect(audioCtx.destination);o.start(start);o.stop(start+dur);
}
function sfx(type){
  if(!audioCtx)return;const t=audioCtx.currentTime;
  if(type==='collect'){note(523,t,0.1,0.08,'sine');note(659,t+0.1,0.1,0.08,'sine');note(784,t+0.2,0.15,0.1,'sine');}
  else if(type==='hit'){note(150,t,0.08,0.08,'sawtooth');note(120,t+0.05,0.1,0.06,'sawtooth');}
  else if(type==='dlg'){note(880,t,0.02,0.02,'square');}
}
let lastMelScene='';
let currentAudio=null;
function playBGM(scene){
  let targetAudio = null;
  let useSynth = false;

  if (scene === 'ending') {
    // MUST be first — gs.map is still 'town' when ending fires
    targetAudio = bgmMice;
  } else if (scene === 'battle') {
    targetAudio = bgmOnePiece;
  } else if ((scene === 'town' || gs.map === 'casa_sara') && gs.chapter === 2) {
    targetAudio = bgmDua;
  } else if (scene === 'title' || scene === 'controls' || scene === 'intro' || (scene === 'town' && gs.chapter === 1)) {
    useSynth = true;
  }

  // Manage MP3 BGM Transitions
  if (currentAudio !== targetAudio) {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
    }
    currentAudio = targetAudio;
    if (currentAudio) {
      currentAudio.play().catch(e => console.log("BGM autoplay blocked:", e));
    }
  }

  // Manage procedural synthesizer BGM for introductory scenes
  if (useSynth) {
    if (scene !== lastMelScene) {
      lastMelScene = scene;
      if (!audioCtx) return;
      const t = audioCtx.currentTime;
      const mels = {
        title: [[523, 0.4], [392, 0.4], [440, 0.4], [523, 0.6]],
        explore: [[261, 0.3], [329, 0.3], [392, 0.3], [440, 0.3], [392, 0.3], [329, 0.3], [261, 0.5]]
      };
      const key = scene === 'title' || scene === 'controls' ? 'title' : 'explore';
      let ct = t;
      for (const [f, d] of (mels[key] || [])) {
        note(f, ct, d * 0.9);
        ct += d;
      }
    }
  } else {
    lastMelScene = '';
  }
}
window.addEventListener('keydown',()=>{if(!audioCtx)initAudio(); playBGM(gs.scene);},{once:false});
window.addEventListener('click',()=>{if(!audioCtx)initAudio(); playBGM(gs.scene);},{once:false});

// ── MAIN LOOP ─────────────────────────────────────────────────
let lastTs=0;
function loop(ts){
  const dt=Math.min((ts-lastTs)/1000,0.1);lastTs=ts;
  cx.clearRect(0,0,GW,GH);cx.fillStyle='#0A0018';cx.fillRect(0,0,GW,GH);
  if(gs.scene==='title'){updateTitle(dt);renderTitle();}
  else if(gs.scene==='controls'){updateControls(dt);renderControls();}
  else if(gs.scene==='intro'){updateIntro(dt);renderIntro();}
  else if(gs.scene==='town'){updateTownScene(dt);renderTownScene();}
  else if(gs.scene==='battle'){updateBattleScene(dt);renderBattleScene();}
  else if(gs.scene==='ending'){updateEndingScene(dt);renderEndingScene();}
  if(audioCtx)playBGM(gs.scene);
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{lastTs=ts;requestAnimationFrame(loop);});
</script>
</body>
</html>
